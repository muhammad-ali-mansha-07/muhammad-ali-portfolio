<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050816;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0d24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1330;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050816;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" rx="10" fill="url(#bgGrad)" />
  
  <!-- UI Browser Chrome -->
  <rect x="20" y="20" width="560" height="360" rx="8" fill="url(#cardGrad)" stroke="rgba(139, 92, 246, 0.15)" stroke-width="1.5" />
  <circle cx="45" cy="40" r="6" fill="#ef4444" />
  <circle cx="65" cy="40" r="6" fill="#eab308" />
  <circle cx="85" cy="40" r="6" fill="#10b981" />
  <line x1="20" y1="60" x2="580" y2="60" stroke="rgba(139, 92, 246, 0.15)" stroke-width="1" />

  <!-- Sidebar -->
  <rect x="20" y="60" width="120" height="320" fill="#050816" opacity="0.6" />
  <rect x="35" y="90" width="90" height="15" rx="4" fill="url(#accentBlue)" />
  <rect x="35" y="125" width="90" height="10" rx="3" fill="#1e293b" />
  <rect x="35" y="155" width="90" height="10" rx="3" fill="#1e293b" />
  <rect x="35" y="185" width="90" height="10" rx="3" fill="#1e293b" />
  <rect x="35" y="215" width="90" height="10" rx="3" fill="#1e293b" />

  <!-- Main Content Dashboard -->
  <!-- Stat Cards -->
  <rect x="160" y="80" width="120" height="60" rx="6" fill="rgba(10, 13, 36, 0.5)" stroke="rgba(139, 92, 246, 0.1)" stroke-width="0.5" />
  <text x="175" y="102" font-family="sans-serif" font-size="10" fill="#94a3b8">Total Students</text>
  <text x="175" y="125" font-family="sans-serif" font-size="18" font-weight="bold" fill="#f8fafc">1,245</text>
  
  <rect x="300" y="80" width="120" height="60" rx="6" fill="rgba(10, 13, 36, 0.5)" stroke="rgba(139, 92, 246, 0.1)" stroke-width="0.5" />
  <text x="315" y="102" font-family="sans-serif" font-size="10" fill="#94a3b8">Active Courses</text>
  <text x="315" y="125" font-family="sans-serif" font-size="18" font-weight="bold" fill="url(#accentBlue)">32</text>
  
  <rect x="440" y="80" width="120" height="60" rx="6" fill="rgba(10, 13, 36, 0.5)" stroke="rgba(139, 92, 246, 0.1)" stroke-width="0.5" />
  <text x="455" y="102" font-family="sans-serif" font-size="10" fill="#94a3b8">Average GPA</text>
  <text x="455" y="125" font-family="sans-serif" font-size="18" font-weight="bold" fill="url(#accentPurple)">3.82</text>

  <!-- Charts & Table Area -->
  <rect x="160" y="160" width="220" height="200" rx="6" fill="rgba(10, 13, 36, 0.5)" stroke="rgba(139, 92, 246, 0.1)" stroke-width="0.5" />
  <text x="175" y="185" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f8fafc">Student Performance</text>
  
  <!-- Bar chart representations -->
  <rect x="180" y="300" width="20" height="40" rx="2" fill="url(#accentBlue)" />
  <rect x="215" y="270" width="20" height="70" rx="2" fill="url(#accentPurple)" />
  <rect x="250" y="240" width="20" height="100" rx="2" fill="url(#accentBlue)" />
  <rect x="285" y="260" width="20" height="80" rx="2" fill="url(#accentPurple)" />
  <rect x="320" y="220" width="20" height="120" rx="2" fill="url(#accentBlue)" />
  
  <rect x="400" y="160" width="160" height="200" rx="6" fill="rgba(10, 13, 36, 0.5)" stroke="rgba(139, 92, 246, 0.1)" stroke-width="0.5" />
  <text x="415" y="185" font-family="sans-serif" font-size="12" font-weight="bold" fill="#f8fafc">Recent Registrations</text>
  
  <!-- Table rows representation -->
  <circle cx="425" cy="220" r="10" fill="#3b82f6" opacity="0.6" />
  <rect x="445" y="215" width="70" height="8" rx="2" fill="#e2e8f0" />
  <line x1="415" y1="240" x2="545" y2="240" stroke="rgba(139, 92, 246, 0.1)" />
  
  <circle cx="425" cy="260" r="10" fill="#10b981" opacity="0.6" />
  <rect x="445" y="255" width="80" height="8" rx="2" fill="#e2e8f0" />
  <line x1="415" y1="280" x2="545" y2="280" stroke="rgba(139, 92, 246, 0.1)" />
  
  <circle cx="425" cy="300" r="10" fill="#8b5cf6" opacity="0.6" />
  <rect x="445" y="295" width="60" height="8" rx="2" fill="#e2e8f0" />
  <line x1="415" y1="320" x2="545" y2="320" stroke="rgba(139, 92, 246, 0.1)" />
</svg>
