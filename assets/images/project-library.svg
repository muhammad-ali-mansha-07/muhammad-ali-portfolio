<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050816;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0d24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" rx="10" fill="url(#bgGrad)" />
  
  <!-- Main visual frame -->
  <rect x="20" y="20" width="560" height="360" rx="8" fill="#050816" stroke="rgba(139, 92, 246, 0.15)" stroke-width="1.5" />
  
  <!-- Search/Header Bar -->
  <rect x="50" y="50" width="500" height="40" rx="20" fill="#0d1330" stroke="rgba(139, 92, 246, 0.2)" stroke-width="1" />
  <circle cx="80" cy="70" r="8" fill="none" stroke="#94a3b8" stroke-width="2" />
  <line x1="86" y1="76" x2="96" y2="86" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />
  <text x="110" y="75" font-family="sans-serif" font-size="13" fill="#94a3b8">Search books, authors, categories...</text>
  
  <!-- Book Shelves / Grid -->
  <!-- Shelf 1 -->
  <line x1="50" y1="230" x2="550" y2="230" stroke="rgba(139, 92, 246, 0.3)" stroke-width="4" stroke-linecap="round" />
  <!-- Books on Shelf 1 -->
  <rect x="80" y="110" width="30" height="120" rx="3" fill="url(#bookGradBlue)" />
  <rect x="85" y="125" width="20" height="80" rx="1" fill="#050816" opacity="0.4" />
  
  <rect x="115" y="130" width="25" height="100" rx="3" fill="url(#bookGradPurple)" />
  <rect x="145" y="100" width="35" height="130" rx="3" fill="url(#bookGradGreen)" />
  
  <!-- Tilted book -->
  <g transform="translate(195,115) rotate(12)">
    <rect x="0" y="0" width="30" height="120" rx="3" fill="url(#bookGradBlue)" />
  </g>
  
  <rect x="235" y="150" width="28" height="80" rx="3" fill="url(#bookGradPurple)" />

  <!-- Shelf 2 -->
  <line x1="50" y1="340" x2="550" y2="340" stroke="rgba(139, 92, 246, 0.3)" stroke-width="4" stroke-linecap="round" />
  <!-- Books on Shelf 2 -->
  <rect x="80" y="240" width="35" height="100" rx="3" fill="url(#bookGradGreen)" />
  <rect x="120" y="260" width="28" height="80" rx="3" fill="url(#bookGradBlue)" />
  <rect x="153" y="230" width="32" height="110" rx="3" fill="url(#bookGradPurple)" />
  <rect x="190" y="250" width="25" height="90" rx="3" fill="url(#bookGradGreen)" />
  
  <!-- Right Panel UI (Inventory Stats) -->
  <rect x="350" y="120" width="200" height="185" rx="8" fill="rgba(10, 13, 36, 0.8)" stroke="rgba(139, 92, 246, 0.2)" stroke-width="1" />
  <text x="370" y="150" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc">Library Statistics</text>
  
  <text x="370" y="185" font-family="sans-serif" font-size="11" fill="#94a3b8">Books Borrowed</text>
  <rect x="370" y="195" width="160" height="8" rx="4" fill="#050816" />
  <rect x="370" y="195" width="112" height="8" rx="4" fill="url(#bookGradBlue)" />
  
  <text x="370" y="230" font-family="sans-serif" font-size="11" fill="#94a3b8">Overdue Alerts</text>
  <circle cx="380" cy="250" r="6" fill="#ef4444" />
  <text x="395" y="254" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ef4444">3 Overdue Records</text>
</svg>
