<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050816;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0d24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeActive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeNormal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" rx="10" fill="url(#bgGrad)" />

  <!-- Visualizer Board -->
  <rect x="20" y="20" width="560" height="360" rx="8" fill="#050816" stroke="rgba(139, 92, 246, 0.15)" stroke-width="1.5" />

  <!-- Tree Connections (Lines) -->
  <!-- Root to children -->
  <line x1="300" y1="80" x2="180" y2="180" stroke="#06b6d4" stroke-width="3" />
  <line x1="300" y1="80" x2="420" y2="180" stroke="rgba(139, 92, 246, 0.2)" stroke-width="2" />
  
  <!-- Left child to children -->
  <line x1="180" y1="180" x2="100" y2="280" stroke="#06b6d4" stroke-width="3" />
  <line x1="180" y1="180" x2="260" y2="280" stroke="rgba(139, 92, 246, 0.2)" stroke-width="2" />

  <!-- Right child to children -->
  <line x1="420" y1="180" x2="350" y2="280" stroke="rgba(139, 92, 246, 0.2)" stroke-width="2" />
  <line x1="420" y1="180" x2="490" y2="280" stroke="rgba(139, 92, 246, 0.2)" stroke-width="2" />

  <!-- Nodes -->
  <!-- Root Node (50) -->
  <circle cx="300" cy="80" r="26" fill="url(#nodeActive)" filter="url(#shadow)" stroke="#fff" stroke-width="2" />
  <text x="290" y="86" font-family="sans-serif" font-weight="bold" font-size="16" fill="#fff">50</text>

  <!-- Left Child (30) -->
  <circle cx="180" cy="180" r="24" fill="url(#nodeActive)" filter="url(#shadow)" stroke="#fff" stroke-width="2" />
  <text x="170" y="186" font-family="sans-serif" font-weight="bold" font-size="15" fill="#fff">30</text>

  <!-- Right Child (70) -->
  <circle cx="420" cy="180" r="24" fill="url(#nodeNormal)" filter="url(#shadow)" />
  <text x="410" y="186" font-family="sans-serif" font-weight="bold" font-size="15" fill="#fff">70</text>

  <!-- Left-Left Child (20) - Active/Traversing -->
  <circle cx="100" cy="280" r="22" fill="url(#nodeActive)" filter="url(#shadow)" stroke="#10b981" stroke-width="3" />
  <text x="90" y="286" font-family="sans-serif" font-weight="bold" font-size="14" fill="#fff">20</text>

  <!-- Left-Right Child (40) -->
  <circle cx="260" cy="280" r="22" fill="url(#nodeNormal)" filter="url(#shadow)" />
  <text x="250" y="286" font-family="sans-serif" font-weight="bold" font-size="14" fill="#fff">40</text>

  <!-- Right-Left Child (60) -->
  <circle cx="350" cy="280" r="22" fill="url(#nodeNormal)" filter="url(#shadow)" />
  <text x="340" y="286" font-family="sans-serif" font-weight="bold" font-size="14" fill="#fff">60</text>

  <!-- Right-Right Child (80) -->
  <circle cx="490" cy="280" r="22" fill="url(#nodeNormal)" filter="url(#shadow)" />
  <text x="480" y="286" font-family="sans-serif" font-weight="bold" font-size="14" fill="#fff">80</text>

  <!-- Algorithm Overlay Box -->
  <rect x="35" y="35" width="160" height="70" rx="6" fill="#0d1330" opacity="0.9" stroke="rgba(139, 92, 246, 0.2)" stroke-width="1" />
  <text x="45" y="55" font-family="monospace" font-size="11" fill="#ec4899">void search(20)</text>
  <text x="45" y="73" font-family="monospace" font-size="10" fill="#94a3b8">Curr: Node(20)</text>
  <text x="45" y="90" font-family="monospace" font-size="10" fill="#10b981">Status: Found!</text>
</svg>
