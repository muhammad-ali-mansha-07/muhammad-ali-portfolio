<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050816;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0d24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" rx="10" fill="url(#bgGrad)" />

  <!-- Layout Showcase (Responsive Stack: Desktop + Mobile mockups) -->
  <!-- Desktop Browser Mockup -->
  <g transform="translate(40, 40)">
    <rect width="360" height="260" rx="6" fill="#050816" stroke="rgba(139, 92, 246, 0.15)" stroke-width="1.5" />
    <!-- Browser Top Bar -->
    <path d="M0,6 Q0,0 6,0 L354,0 Q360,0 360,6 L360,20 L0,20 Z" fill="#0d1330" />
    <circle cx="15" cy="10" r="4" fill="#ef4444" />
    <circle cx="28" cy="10" r="4" fill="#eab308" />
    <circle cx="41" cy="10" r="4" fill="#10b981" />
    
    <!-- Navbar inside mock -->
    <rect x="10" y="30" width="340" height="20" rx="4" fill="#0d1330" opacity="0.8" />
    <circle cx="25" cy="40" r="6" fill="url(#accentGrad)" />
    <rect x="250" y="37" width="20" height="6" rx="2" fill="#1e293b" />
    <rect x="280" y="37" width="20" height="6" rx="2" fill="#1e293b" />
    <rect x="310" y="37" width="25" height="6" rx="2" fill="url(#primaryGrad)" />

    <!-- Hero details inside mock -->
    <text x="30" y="90" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f8fafc">Hi, I'm Muhammad Ali</text>
    <text x="30" y="110" font-family="sans-serif" font-size="9" fill="url(#accentGrad)">Software Engineering Student</text>
    <rect x="30" y="125" width="200" height="6" rx="2" fill="#1e293b" opacity="0.6" />
    <rect x="30" y="137" width="160" height="6" rx="2" fill="#1e293b" opacity="0.6" />
    
    <!-- Buttons -->
    <rect x="30" y="160" width="55" height="18" rx="4" fill="url(#primaryGrad)" />
    <rect x="95" y="160" width="55" height="18" rx="4" fill="none" stroke="#1e293b" stroke-width="1" />
    
    <!-- Avatar circle -->
    <circle cx="280" cy="120" r="40" fill="#0d1330" stroke="url(#accentGrad)" stroke-width="2" />
    <circle cx="280" cy="120" r="30" fill="url(#primaryGrad)" opacity="0.6" />

    <!-- Footer of mockup -->
    <rect x="0" y="240" width="360" height="20" fill="#0d1330" />
  </g>

  <!-- Mobile Screen Mockup overlapping -->
  <g transform="translate(390, 100)">
    <rect width="140" height="240" rx="14" fill="#050816" stroke="rgba(139, 92, 246, 0.25)" stroke-width="3" />
    <!-- Speaker / Camera area -->
    <rect x="45" y="5" width="50" height="10" rx="5" fill="#0d1330" />
    
    <!-- Mobile layout content -->
    <circle cx="70" cy="70" r="28" fill="#0d1330" stroke="url(#accentGrad)" stroke-width="1.5" />
    
    <rect x="20" y="115" width="100" height="8" rx="2" fill="#f8fafc" />
    <rect x="30" y="130" width="80" height="5" rx="2" fill="url(#accentGrad)" />
    
    <rect x="20" y="155" width="45" height="15" rx="3" fill="url(#primaryGrad)" />
    <rect x="75" y="155" width="45" height="15" rx="3" fill="none" stroke="#1e293b" stroke-width="1" />
    
    <rect x="20" y="190" width="100" height="35" rx="4" fill="#0d1330" stroke="#1e293b" stroke-width="0.5" />
    <rect x="28" y="198" width="40" height="6" rx="2" fill="#1e293b" />
    <rect x="28" y="210" width="60" height="4" rx="2" fill="#64748b" />
  </g>
</svg>
